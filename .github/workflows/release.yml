name: Release

on:
  push:
    branches:
      - main
    paths:
      - "*.go"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - ".claude-plugin/*.json"
      - ".mcp.json"
      - "scripts/**"
      - "agents/**"

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Versions in sync
        run: |
          P=$(jq -r '.version' .claude-plugin/plugin.json)
          M=$(jq -r '.plugins[] | select(.name == "agentic-minions") | .version' .claude-plugin/marketplace.json)
          if [ "$P" != "$M" ]; then
            echo "ERROR: plugin.json ($P) and marketplace.json ($M) versions differ"
            exit 1
          fi

  version:
    needs: validate
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "${LATEST}" ]; then
            NEXT="v0.1.0"
          else
            # Increment patch: v0.1.2 → v0.1.3
            MAJOR=$(echo "${LATEST}" | cut -d. -f1)
            MINOR=$(echo "${LATEST}" | cut -d. -f2)
            PATCH=$(echo "${LATEST}" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Update plugin.json version
        run: |
          VERSION="${{ steps.bump.outputs.tag }}"
          # Strip leading 'v' for the version field
          VERSION_NUM="${VERSION#v}"
          jq --arg v "$VERSION_NUM" '.version = $v' .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp
          mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json
          jq --arg v "$VERSION_NUM" '(.plugins[] | select(.name == "agentic-minions")).version = $v' .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.tmp
          mv .claude-plugin/marketplace.json.tmp .claude-plugin/marketplace.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump plugin version to ${VERSION_NUM}"
          git push origin main

      - name: Create tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"
