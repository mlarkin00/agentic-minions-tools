name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            platform: darwin
            arch: arm64
          - goos: darwin
            goarch: amd64
            platform: darwin
            arch: x64
          - goos: linux
            goarch: amd64
            platform: linux
            arch: x64
          - goos: linux
            goarch: arm64
            platform: linux
            arch: arm64
          - goos: windows
            goarch: amd64
            platform: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BIN="agentic-minions"
          if [ "${GOOS}" = "windows" ]; then BIN="agentic-minions.exe"; fi

          go build -trimpath -ldflags="-s -w" -o "${BIN}" .

          mkdir staging
          cp "${BIN}" GEMINI.md staging/

          # Build release manifest pointing at the compiled binary
          sed 's|"command": "go",|"command": "${extensionPath}${/}'"${BIN}"'",|; s|"args": \["run", "."\]|"args": []|' \
            gemini-extension.json > staging/gemini-extension.json

          ARCHIVE="${{ matrix.platform }}.${{ matrix.arch }}.agentic-minions"
          if [ "${GOOS}" = "windows" ]; then
            (cd staging && zip -r "../${ARCHIVE}.zip" .)
          else
            tar -czf "${ARCHIVE}.tar.gz" -C staging .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            *.tar.gz
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
