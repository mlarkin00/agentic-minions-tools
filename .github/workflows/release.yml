name: Release

on:
  push:
    branches:
      - main
    paths:
      - "*.go"
      - "go.mod"
      - "go.sum"
      - "internal/**"
      - "gemini-extension.json"
      - "GEMINI.md"

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "${LATEST}" ]; then
            NEXT="v0.1.0"
          else
            # Increment patch: v0.1.2 → v0.1.3
            MAJOR=$(echo "${LATEST}" | cut -d. -f1)
            MINOR=$(echo "${LATEST}" | cut -d. -f2)
            PATCH=$(echo "${LATEST}" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            platform: darwin
            arch: arm64
          - goos: darwin
            goarch: amd64
            platform: darwin
            arch: x64
          - goos: linux
            goarch: amd64
            platform: linux
            arch: x64
          - goos: linux
            goarch: arm64
            platform: linux
            arch: arm64
          - goos: windows
            goarch: amd64
            platform: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BIN="agentic-minions"
          if [ "${GOOS}" = "windows" ]; then BIN="agentic-minions.exe"; fi

          go build -trimpath -ldflags="-s -w" -o "${BIN}" .

          mkdir staging
          cp "${BIN}" GEMINI.md staging/

          # Build release manifest pointing at the compiled binary
          sed 's|"command": "go",|"command": "${extensionPath}${/}'"${BIN}"'",|; s|"args": \["run", "."\]|"args": []|' \
            gemini-extension.json > staging/gemini-extension.json

          ARCHIVE="${{ matrix.platform }}.${{ matrix.arch }}.agentic-minions"
          if [ "${GOOS}" = "windows" ]; then
            (cd staging && zip -r "../${ARCHIVE}.zip" .)
          else
            tar -czf "${ARCHIVE}.tar.gz" -C staging .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            *.tar.gz
            *.zip

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
